# ============================================
# ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
# ============================================
[all:vars]
ansible_user=kupriyanov
ansible_ssh_private_key_file=~/.ssh/id_ed25519
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

# Адрес балансировщика
alb_address=81.26.191.122:80

# IP-адреса хостов
bastion_ip=84.252.131.175
weba_ip=10.10.1.23
webb_ip=10.10.2.23
elasticsearch_ip=10.10.1.20
zabbix_ip=51.250.95.115
kibana_ip=46.21.245.86

# ============================================
# БАСТИОН
# ============================================
[bastion]
bastion-server ansible_host=84.252.131.175

# ============================================
# ELASTICSEARCH
# ============================================
[elasticsearch_servers]
elasticsearch ansible_host=10.10.1.20

# ============================================
# KIBANA
# ============================================
[kibana_servers]
kibana-server ansible_host=46.21.245.86

# ============================================
# ВЕБ-СЕРВЕРЫ
# ============================================
[web_servers]
weba ansible_host=10.10.1.23
webb ansible_host=10.10.2.23

# ============================================
# ZABBIX
# ============================================
[zabbix_servers]
zabbix-server ansible_host=51.250.95.115

# ============================================
# ПРОКСИ ЧЕРЕЗ БАСТИОН
# ============================================
[web_servers:vars]
ansible_ssh_common_args='-o ProxyCommand="ssh -i ~/.ssh/id_ed25519 -W %h:%p -q kupriyanov@84.252.131.175" -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

[elasticsearch_servers:vars]
ansible_ssh_common_args='-o ProxyCommand="ssh -i ~/.ssh/id_ed25519 -W %h:%p -q kupriyanov@84.252.131.175" -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
