---
- name: install nginx
  hosts: webb
  become: yes
  vars_files:
    - "./vars/main.yml"

  tasks:
  - name: install nginx
    apt:
      name:
       - nginx #веб-сервер
       - net-tools #набор классических сетевых утилит (ifconfig, netstat, route, arp и др.)
      state: present
      update_cache: yes

  - name: copy index.nginx-debian.html web-b
    copy:
      src: ./webb_index/index.nginx-debian.html
      dest: /var/www/html/index.nginx-debian.html
      remote_src: no
      force: yes
      backup: yes

  - name: reload nginx webb
    service:
      name: nginx
      state: reloaded
