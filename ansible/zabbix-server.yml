---
- name: install zabbix-server
  hosts: zabbix-server
  become: true
  vars_files:
    - "./vars/main.yml"
  
  tasks:

# Установка postgresql, apache2
  - name: install postgresql, apache2
    apt:
      name:
       - postgresql #реляционная база данных PostgreSQL
       - apache2 #веб-сервер Apache HTTP Server
      state: present
      update_cache: yes

# Скачиваем .deb пакет с официального репозитория Zabbix 
  - name: Download Zabbix repository .deb package
    get_url:
      url: https://repo.zabbix.com/zabbix/7.0/ubuntu/pool/main/z/zabbix-release/zabbix-release_latest_7.0+ubuntu22.04_all.deb
      dest: /tmp/zabbix-release_latest_7.0+ubuntu22.04_all.deb
      mode: '0644'

# Установка Zabbix-server с помощью apt
  - name: Install Zabbix repository
    remote_user: kupriyanov 
    apt:
      deb: /tmp/zabbix-release_latest_7.0+ubuntu22.04_all.deb
      update_cache: yes

# Установка дополнительных пакетов
  - name: Install components zabbix-server, frontend, zabbix-agent
    apt:
      name:
        - zabbix-server-pgsql #ядро системы мониторинга — сам сервер Zabbix с поддержкой PostgreSQL
        - zabbix-frontend-php #веб-интерфейс Zabbix
        - php8.1-pgsql #драйвер PostgreSQL для PHP 8.1
        - zabbix-apache-conf #конфигурационный файл для Apache
        - zabbix-sql-scripts #SQL-скрипты для создания структуры базы данных
        - zabbix-agent #агент мониторинга
      state: present
      update_cache: yes

# Создание пользователя zabbix с паролем для postgresql
  - name: Create db_user for postgresql_db with password
    ansible.builtin.shell: |
      su - postgres -c 'psql --command "CREATE USER {{ zabbix_db_user }} WITH PASSWORD '\'{{ zabbix_db_password }}\'';"'

# Создание БД zabbix для пользователя zabbix
  - name: Create postgresql_db for db_user
    ansible.builtin.shell: |
      su - postgres -c 'psql --command "CREATE DATABASE {{ zabbix_db_name }} OWNER {{ zabbix_db_user }};"'

# Импорт первоначальной схемы и данных 
  - name: Import schema
    ansible.builtin.shell: |
      zcat /usr/share/zabbix-sql-scripts/postgresql/server.sql.gz | sudo -u {{ zabbix_db_user }} psql {{ zabbix_db_name }}

# Определение пароля для БД в файле zabbix_server.conf
  - name: Set DBPassword in Zabbix config
    ansible.builtin.lineinfile:
      path: /etc/zabbix/zabbix_server.conf
      regexp: '# DBPassword='
      line: 'DBPassword={{ zabbix_db_password }}'

# Перезагрузка и запуск служб
  - name: Enable and restart services
    ansible.builtin.service:
      name: "{{ item }}"
      enabled: true
      state: restarted
    loop:
      - zabbix-server
      - zabbix-agent
      - apache2
      - postgresql
