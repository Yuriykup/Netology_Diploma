 
cluster.name: ntlg-kupriyanov-cluster        # Имя кластера
node.name: elasticsearch       # Уникальное имя для конкретного экземпляра сервера
path.data: /var/lib/elasticsearch     # Путь к директории с данными
path.logs: /var/log/elasticsearch     # Путь к лог-файлам
network.host: 0.0.0.0                 # IP-адрес, который будет слушать Elasticsearch
http.port: 9200                       # Порт для HTTP-запросов (по умолчанию 9200)
xpack.security.enabled: false         # Отключаем безопасность (только для тестов!)
discovery.type: single-node           # Одноузловой кластер (без обнаружения других нод)
